<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Página de inscrição em eventos">
  <meta name="keywords" content="IFSP, inscrição, formulário HTML5">
  <meta name="author" content="Seu Nome">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INSCRIÇÃO - IFSP</title>
  <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>
<body id="topo">

  <header class="topo">
    <nav class="menu">
      <a href="index.html">HOME</a> |
      <a href="eventos.html">EVENTOS</a> |
      <a href="contato.html">CONTATO</a> |
      <a href="sobre.html">SOBRE</a> |
      <a href="entrar.html">ENTRAR</a>
    </nav>

    <img src="img/Logo.jpg" alt="Logo IFSP" class="logo">
  </header>

  <main>
    <h1>Inscreva-se</h1>

    <form action="#" method="post">

      <p>
        <label for="evento">Evento</label>
        <select id="evento" name="evento">
          <option value="">-- Selecione --</option>
          <option value="voce-sem-asas">Voce sem asas</option>
          <option value="festa-junina">Festa junina</option>
          <option value="semana-tecnologia">Semana de tecnologia</option>
        </select>
      </p>

      <fieldset>
        <legend>Informações de Acesso</legend>

        <p>
          <label for="usuario-inscricao">Usuário</label>
          <input type="text" id="usuario-inscricao" name="usuario-inscricao" placeholder="username" required>
        </p>

        <p>
          <label for="senha-inscricao">Senha</label>
          <input type="password" id="senha-inscricao" name="senha-inscricao" required>
        </p>

        <p>
          <label for="confirma-senha">Confirme a Senha</label>
          <input type="password" id="confirma-senha" name="confirma-senha" required>
        </p>
      </fieldset>

      <fieldset>
        <legend>Informações Pessoais</legend>

        <p>
          <label for="nome-completo">Nome Completo</label>
          <input type="text" id="nome-completo" name="nome-completo" required>
        </p>

        <p>
          <label for="email-pessoal">E-mail</label>
          <input type="email" id="email-pessoal" name="email-pessoal" required>
        </p>

        <p>
          <label for="celular">Celular</label>
          <input type="tel" id="celular" name="celular" placeholder="(99) 99999-9999">
          (99) 99999-9999
        </p>

        <fieldset>
          <legend>Sexo</legend>
          <label><input type="radio" name="sexo" value="masculino"> Masculino</label>
          <label><input type="radio" name="sexo" value="feminino"> Feminino</label>
        </fieldset>

        <p>
          <label for="data-nascimento">Data de Nascimento</label>
          <input type="date" id="data-nascimento" name="data-nascimento">
        </p>

        <p>
          <label for="cor-favorita">Cor Favorita</label>
          <input type="color" id="cor-favorita" name="cor-favorita">
        </p>

        <p>
          <label for="github">Perfil no Github</label>
          <input type="url" id="github" name="github">
        </p>
      </fieldset>

      <p>
        <input type="submit" value="Inscrever">
        <input type="reset" value="Limpar">
      </p>

    </form>
  </main>

  <footer>
    <img src="img/facebook.png" alt="Facebook" class="facebook">

    <p class="rodape-info">
      IFSP - Câmpus Pirituba - Av. Mutinga, 951 - Jardim Santo Elias - CEP: 05110-000 -
      São Paulo/SP - Contato: (11) 2504-0100
    </p>
  </footer>

  <a href="#topo" class="top-link">
    <img src="img/MoveTop.png" alt="Voltar ao topo">
  </a>

</body>
</html>
