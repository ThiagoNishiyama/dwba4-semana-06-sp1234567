<body>

<a id="topo"></a>

<div class="container">

  <header>
    <img
      src="https://raw.githubusercontent.com/DWBA4/dwba4_semana_imagens/master/Logo.jpg"
      alt="Logo do IFSP">
  </header>

  <nav class="menu">
    <a href="index.html">HOME</a>

    <div class="dropdown">
      <a href="cursos.html">CURSOS</a>
      <div class="dropdown-content">
        <a href="#">ADS</a>
        <a href="#">Engenharia de Produção</a>

    <a href="eventos.html">EVENTOS</a>

    <a href="contato.html">CONTATO</a>
    <a href="sobre.html">SOBRE</a>
    <a href="entrar.html">ENTRAR</a>
  </nav>

  <main>
    <section class="card">
      <h1>Mande uma Mensagem</h1>

      <form action="#" method="post">

        <p>
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" required />
        </p>

        <p>
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required />
        </p>

        <p>
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" name="telefone" placeholder="(99) 99999-9999" />
        </p>

        <p>
          <label for="assunto">Assunto</label>
          <select id="assunto" name="assunto">
            <option value="">-- Selecione --</option>
            <option value="duvida">Dúvida</option>
            <option value="elogio">Elogio</option>
            <option value="reclamacao">Reclamação</option>
          </select>
        </p>

        <p>
          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem" name="mensagem"></textarea>
        </p>

        <fieldset>
          <legend>Opções de Resposta</legend>

          <label>
            <input type="checkbox" name="resposta" value="email" />
            E-mail
          </label>

          <label>
            <input type="checkbox" name="resposta" value="telefone" />
            Telefone
          </label>
        </fieldset>

        <p>
          <button type="submit">Enviar</button>
        </p>

      </form>
    </section>
  </main>

  <footer>
    <p>Desenvolvido para a atividade de Introdução ao CSS - Semana 06</p>
  </footer>

</div>

</a>
