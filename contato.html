<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato</title>
  <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/DWBA4/dwba4_semana_imagens/master/favicon.ico" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a id="topo"></a>

  <div class="container">
    <header>
      <img src="https://raw.githubusercontent.com/DWBA4/dwba4_semana_imagens/master/Logo.jpg" alt="Logo do IFSP" />
    </header>

    <nav>
      <a href="index.html">Home</a>
      <a href="eventos.html">Eventos</a>
      <a href="contato.html">Contato</a>
      <a href="sobre.html">Sobre</a>
      <a href="entrar.html">Entrar</a>
      <a href="galeria.html">GALERIA</a>
    </nav>

    <main>
      <h1>Mande uma mensagem</h1>

      <form action="#" method="post">
        <ul>
          <li>
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required />
          </li>

          <li>
            <label for="email">E-Mail</label>
            <input type="email" id="email" name="email" required />
          </li>

          <li>
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(99) 99999-9999" />
          </li>

          <li>
            <label for="assunto">Assunto</label>
            <select id="assunto" name="assunto">
              <option value="">-- Selecione --</option>
              <option value="duvida">Dúvida</option>
              <option value="elogio">Elogio</option>
              <option value="reclamacao">Reclamação</option>
            </select>
          </li>

          <li>
            <label for="mensagem">Mensagem</label><br />
            <textarea id="mensagem" name="mensagem" rows="4" cols="30"></textarea>
          </li>

          <li>
            <fieldset>
              <legend>Opções de Resposta</legend>
              <label><input type="checkbox" name="resposta" value="email" /> E-Mail</label>
              <label><input type="checkbox" name="resposta" value="telefone" /> Telefone</label>
            </fieldset>
          </li>

          <li>
            <button type="submit">Enviar</button>
          </li>
        </ul>
      </form>
    </main>

    <footer>
      <p>Desenvolvido para a atividade de HTML5 - Semana 05</p>
    </footer>
  </div>

  <a class="top-link" href="#topo">
    <img
      src="https://raw.githubusercontent.com/DWBA4/dwba4_semana_imagens/master/MoveTop.png"
      alt="Voltar ao topo"
    />
  </a>
</body>
</html>
